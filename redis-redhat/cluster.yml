# cluster.yml
---
- hosts: vm1
  become: yes
  gather_facts: no

  tasks:

    - name: Create 6-node Redis Cluster (3 Masters + 3 Replicas)
      shell: |
        yes yes | redis-cli --cluster create \
        10.30.1.60:6379 \
        10.30.1.61:6379 \
        10.30.1.62:6379 \
        10.30.1.60:7000 \
        10.30.1.61:7000 \
        10.30.1.62:7000 \
        --cluster-replicas 1
